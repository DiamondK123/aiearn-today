name: 每日AI新聞自動更新

on:
  # 每天 UTC 00:00 = 台北時間早上 08:00
  schedule:
    - cron: '0 0 * * *'

  # 手動觸發（測試用）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安裝依賴套件
        run: |
          pip install anthropic feedparser

      - name: 📰 執行每日新聞更新腳本
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python fetch_news.py

      - name: 💾 Commit 更新後的頁面
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AIEarn Bot"
          git add index-zh.html news-zh.html index.html _archive/
          git diff --staged --quiet || git commit -m "📰 每日自動更新：$(date +'%Y-%m-%d') 台北時間08:00"
          git push
