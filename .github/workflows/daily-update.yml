name: Daily AI News Auto-Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install anthropic feedparser

      - name: 📰 Run daily news update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: 💾 Commit & push all generated pages to GitHub
        run: |
          git config --local user.email "bot@aiearn.today"
          git config --local user.name "AIEarn Bot"
          git add -A
          git diff --staged --quiet || git commit -m "📰 Daily update: $(date +'%Y-%m-%d') 08:00 UTC+8"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git push
