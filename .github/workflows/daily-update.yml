name: Daily AI News Auto-Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install anthropic feedparser

      - name: 📰 Run daily news update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: 💾 Commit updated pages to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AIEarn Bot"
          git add index.html news*.html _archive/ || true
          git diff --staged --quiet || git commit -m "📰 Daily update: $(date +'%Y-%m-%d') 08:00 UTC+8"
          git push || true

      - name: 🚀 Deploy to Hostinger via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './*.html'
          remote_path: '/home/${{ secrets.FTP_USERNAME }}/public_html'
          sftp_only: true
